<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gratianopolis</title>
    <link rel="stylesheet" href="../css/style_base_latin.css">
</head>
<body>

<main class="container">

<h1>Corpus Gratianopolitanum</h1>

<!-- Filtres généraux -->
<div id="filtres">
    <select id="type">
        <option value="">Type de texte</option>
        <option value="prose">Prose</option>
        <option value="poesie">Poésie</option>
    </select>

    <select id="niveau">
        <option value="">Difficulté</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
    </select>
</div>

<!-- Filtres linguistiques -->
<div class="ligne-filtre">
    <label class="titre-filtre">Verbes</label>
    <select class="ana" data-cat="conjugaison"></select>
    <select class="op" data-cat="conjugaison">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="conjugaison"></select>
    <select class="op" data-cat="conjugaison">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="conjugaison"></select>
</div>

<div class="ligne-filtre">
    <label class="titre-filtre">Noms, pronoms, adjectifs</label>
    <select class="ana" data-cat="morphologie"></select>
    <select class="op" data-cat="morphologie">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="morphologie"></select>
     <select class="op" data-cat="morphologie">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="morphologie"></select>
</div>

<div class="ligne-filtre">
    <label class="titre-filtre">Syntaxe</label>
    <select class="ana" data-cat="syntaxe"></select>
    <select class="op" data-cat="syntaxe">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="syntaxe"></select>
    <select class="op" data-cat="syntaxe">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="syntaxe"></select>
</div>

<p id="compteur"></p>
<p id="message-vide" style="display:none;">Aucun texte correspondant</p>

<hr>

<!-- Corpus (vide au départ) -->
<div id="corpus"></div>

</main>

<script src="../js/filter_latin.js"></script>
    
<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", function(event) {
    import ("https://cdn.jsdelivr.net/npm/alpheios-embedded@latest/dist/alpheios-embedded.js")
      .then(alpheiosEmbed => {
        window.AlpheiosEmbed = alpheiosEmbed;
        alpheiosEmbed.importDependencies({ 
          mode: 'custom', 
          libs: { 
            components: { src: 'https://cdn.jsdelivr.net/npm/alpheios-components@latest/dist/alpheios-components.js' } 
          } 
        }).then(embedded => {
          embedded.activate();
          
          // --- AJOUT POUR LE CHARGEMENT DYNAMIQUE ---
          // On force Alpheios à réanalyser la page après un court délai
          // pour s'assurer que vos textes sont chargés.
          setTimeout(() => {
            embedded.update();
          }, 1000); 
          // ------------------------------------------
          
        }).catch(e => {
          console.error(`Alpheios embedding failed: ${e}`)
        })
      }).catch(e => {
        console.error(`Alpheios embedding failed: ${e}`)
      })
  });
</script>
</body>
</html>
