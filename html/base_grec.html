<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Times New Roma - Grec</title>
    <link rel="stylesheet" href="../css/style_base_grec.css">
</head>
<body>

<nav>
    <a href="../index.html" class="nav-btn home">← Accueil</a>
</nav>
    
<main class="container">

<header class="page-header">

        <h1>Times New Roma</h1>
        <p class="page-subtitle">Textes grecs</p>
        <p class="page-subtitle">Le chargement est effectué lorsque le symbole – s'affiche dans les barres de recherche</p>
        <div class="divider"><span>✦</span></div>
    </header>

<!-- Filtres généraux -->
<div id="filtres">
    <select id="type">
        <option value="">Type de texte</option>
        <option value="prose">Prose</option>
        <option value="poesie">Poésie</option>
    </select>

    <select id="genre">
    <option value="">Genre</option>
    <option value="comedie">Comédie</option>
    <option value="didactique">Didactique</option>
    <option value="discours">Discours</option>
    <option value="elegie">Élégie</option>
    <option value="epigramme">Épigramme</option>
    <option value="epistolaire">Épistolaire</option>
    <option value="epopee">Épopée</option>
    <option value="fable">Fable</option>
    <option value="histoire">Histoire</option>
    <option value="philosophie">Philosophie</option>
    <option value="roman">Roman</option>
    <option value="theatre">Théâtre</option>
    <option value="tragedie">Tragédie</option>
    <option value="technique">Traités techniques</option>
</select>
    
    <select id="niveau">
        <option value="">Difficulté</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
    </select>
</div>

<!-- Filtres linguistiques -->
<div class="ligne-filtre">
    <label class="titre-filtre">Verbes</label>
    <select class="ana" data-cat="conjugaison"></select>
    <select class="op" data-cat="conjugaison">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="conjugaison"></select>
    <select class="op" data-cat="conjugaison">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="conjugaison"></select>
</div>

<div class="ligne-filtre">
    <label class="titre-filtre">Noms, pronoms, adjectifs</label>
    <select class="ana" data-cat="morphologie"></select>
    <select class="op" data-cat="morphologie">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="morphologie"></select>
     <select class="op" data-cat="morphologie">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="morphologie"></select>
</div>

<div class="ligne-filtre">
    <label class="titre-filtre">Syntaxe</label>
    <select class="ana" data-cat="syntaxe"></select>
    <select class="op" data-cat="syntaxe">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="syntaxe"></select>
    <select class="op" data-cat="syntaxe">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="syntaxe"></select>
</div>

 <div class="ligne-filtre">
    <label class="titre-filtre">Thématiques</label>
    <select class="ana" data-cat="theme"></select>
    <select class="op" data-cat="theme">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="theme"></select>
     <select class="op" data-cat="theme">
        <option value="or">OU</option>
        <option value="and">ET</option>
        <option value="without">SANS</option>
    </select>
    <select class="ana" data-cat="theme"></select>
</div>
    
<p id="compteur"></p>
<p id="message-vide" style="display:none;">Aucun texte correspondant</p>

<hr>

<!-- Corpus (vide au départ) -->
<div id="corpus"></div>

</main>

<script src="../js/filter_grec.js"></script>
</body>
</html>
