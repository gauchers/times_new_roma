name: Convert CSV to HTML

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4️⃣ CSV → TEI
      - name: CSV to TEI
        run: python py/csv_to_xml.py

      # 5️⃣ Télécharger Saxon
      - name: Download Saxon HE
        run: |
          wget https://github.com/Saxonica/Saxon-HE/releases/download/SaxonHE12-9/SaxonHE12-9J.zip -O saxon.zip
          unzip -q saxon.zip -d saxon

      # 6️⃣ TEI → HTML avec Saxon
      - name: TEI to HTML with Saxon
        run: |
          mkdir -p data
          for tei_file in tei/*.xml; do
            [ -e "$tei_file" ] || continue
            if [ ! -s "$tei_file" ]; then
              echo "⚠️ TEI vide ignoré : $tei_file"
              continue
            fi
            filename=$(basename "$tei_file" .xml)
            java -cp "saxon/saxon-he-12.9.jar:saxon/lib/*" net.sf.saxon.Transform \
              -s:"$tei_file" \
              -xsl:xsl/xml_to_html.xsl \
              -o:"data/${filename}.html"
          done

      # 7️⃣ CSV → HTML sommaire
      - name: Generate HTML sommaire
        run: python py/generate_sommaire.py

      # 8️⃣ Génération de index.json
      - name: Generate index.json
        run: |
          mkdir -p data
          ls data/*.html 2>/dev/null \
            | xargs -n 1 basename \
            | jq -R . \
            | jq -s . > data/index.json

      # 9️⃣ Commit & push — tei/, data/, html/sommaire.html
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global core.quotePath false
          git add tei/ data/ html/sommaire.html
          if [ -z "$(git status --porcelain)" ]; then
            echo "Aucune modification détectée."
          else
            git commit -m "Update TEI, HTML, index.json and sommaire [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
