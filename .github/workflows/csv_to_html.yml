name: Convert CSV to HTML

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4️⃣ Détection des changements OU fichier de sortie manquant
      - name: Detect source changes or missing output
        id: sources
        run: |
          NEED_REBUILD=false

          # 🔍 Changements sur le CSV ou le script
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            -- 'csv/tableau.csv' 'py/generate_sommaire.py')
          if [ -n "$CHANGED" ]; then
            echo "Sources modifiées :"
            echo "$CHANGED"
            NEED_REBUILD=true
          fi

          # 🔍 Fichier HTML de sortie manquant
          if [ ! -f html/sommaire.html ]; then
            echo "⚠️ html/sommaire.html introuvable"
            NEED_REBUILD=true
          fi

          if [ "$NEED_REBUILD" = true ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "➡️ Régénération nécessaire"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Aucune action nécessaire"
          fi

      # 5️⃣ CSV → HTML sommaire
      - name: Generate HTML sommaire
        if: steps.sources.outputs.changed == 'true'
        run: python py/generate_sommaire.py

      # 6️⃣ Commit & push
      - name: Commit and push changes
        if: steps.sources.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global core.quotePath false
          git add html/sommaire.html
          if [ -z "$(git status --porcelain)" ]; then
            echo "Aucune modification détectée."
          else
            git commit -m "Update html/sommaire.html [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
